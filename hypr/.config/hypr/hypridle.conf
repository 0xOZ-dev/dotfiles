general {
    lock_cmd = pidof hyprlock || hyprlock       # Avoid starting multiple instances
    before_sleep_cmd = loginctl lock-session    # Lock before system suspends
    after_sleep_cmd = hyprctl dispatch dpms on  # Turn screen on after waking up
}

# Stage 1: Dim the screen after 2.5 minutes
listener {
    timeout = 150
    on-timeout = brightnessctl -s set 10         # Save current brightness and dim to 10
    on-resume = brightnessctl -r                 # Restore brightness when you move the mouse
}

# Stage 2: Lock the screen after 5 minutes
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Stage 3: Turn off the display after 5.5 minutes
listener {
    timeout = 330
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Stage 4: Suspend the system after 15 minutes
listener {
    timeout = 900
    on-timeout = systemctl suspend
}
