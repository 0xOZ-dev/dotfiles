# BACKGROUND
background {
    monitor =
    path = screenshot
    # Frosted glass effect
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME LABEL
label {
    monitor =
    text = $TIME
    # Tokyo Night Purple (#bb9af7) for a slight neon pop on the clock
    color = rgba(187, 154, 247, 1.0)
    font_size = 75
    font_family = Cousine Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
}

# USERNAME LABEL
label {
    monitor =
    text = Hi there, $USER
    # Tokyo Night Foreground/Text (#c0caf5)
    color = rgba(192, 202, 245, 1.0)
    font_size = 20
    font_family = Cousine Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# PASSWORD INPUT
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true

    # Tokyo Night Background (#1a1b26) with slight transparency
    inner_color = rgba(26, 27, 38, 0.8)

    # Tokyo Night Foreground (#c0caf5) for the typing text
    font_color = rgb(192, 202, 245)

    # Tokyo Night Blue Accent (#7aa2f7) for the idle ring
    outer_color = rgb(122, 162, 247)

    # Tokyo Night Green (#9ece6a) when checking password
    check_color = rgb(158, 206, 106)

    # Tokyo Night Red (#f7768e) when password fails
    fail_color = rgb(247, 118, 142)

    fade_on_empty = false
    placeholder_text = <i><span foreground="##7aa2f7">Enter Password...</span></i>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
